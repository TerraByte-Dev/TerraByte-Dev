    <g fill="#00FF88" fill-opacity="0.30" transform="translate(830.0,178) scale(0.19,-0.19)"><path transform="translate(0,0)" d="M250 80Q254 64 254 40Q254 17 250 0H150Q146 17 146 40Q146 64 150 80Q146 97 146 120Q146 144 150 160H250Q254 144 254 120Q254 97 250 80Z"/><path transform="translate(400,0)" d="M364 200Q364 177 360 160Q364 144 364 120Q364 97 360 80H320Q324 64 324 40Q324 17 320 0H80Q76 17 76 40Q76 64 80 80H40Q36 97 36 120Q36 144 40 160H120Q124 144 124 120Q124 97 120 80H280Q276 97 276 120Q276 144 280 160Q276 177 276 200Q276 224 280 240H80Q76 257 76 280Q76 304 80 320H40Q36 337 36 360Q36 384 40 400Q36 417 36 440Q36 464 40 480H80Q76 497 76 520Q76 544 80 560H320Q324 544 324 520Q324 497 320 480H360Q364 464 364 440Q364 417 360 400H280Q276 417 276 440Q276 464 280 480H120Q124 464 124 440Q124 417 120 400Q124 384 124 360Q124 337 120 320H320Q324 304 324 280Q324 257 320 240H360Q364 224 364 200Z"/><path transform="translate(800,0)" d="M360 480Q364 464 364 440Q364 417 360 400H320Q324 384 324 360Q324 337 320 320H280Q284 304 284 280Q284 257 280 240H240Q244 224 244 200Q244 177 240 160Q244 144 244 120Q244 97 240 80Q244 64 244 40Q244 17 240 0H160Q156 17 156 40Q156 64 160 80Q156 97 156 120Q156 144 160 160Q156 177 156 200Q156 224 160 240H120Q116 257 116 280Q116 304 120 320H80Q76 337 76 360Q76 384 80 400H40Q36 417 36 440Q36 464 40 480Q36 497 36 520Q36 544 40 560H120Q124 544 124 520Q124 497 120 480Q124 464 124 440Q124 417 120 400H160Q164 384 164 360Q164 337 160 320H240Q236 337 236 360Q236 384 240 400H280Q276 417 276 440Q276 464 280 480Q276 497 276 520Q276 544 280 560H360Q364 544 364 520Q364 497 360 480Z"/><path transform="translate(1200,0)" d="M364 200Q364 177 360 160Q364 144 364 120Q364 97 360 80H320Q324 64 324 40Q324 17 320 0H80Q76 17 76 40Q76 64 80 80H40Q36 97 36 120Q36 144 40 160H120Q124 144 124 120Q124 97 120 80H280Q276 97 276 120Q276 144 280 160Q276 177 276 200Q276 224 280 240H80Q76 257 76 280Q76 304 80 320H40Q36 337 36 360Q36 384 40 400Q36 417 36 440Q36 464 40 480H80Q76 497 76 