  </g>

  <!-- glow divider -->
  <rect x="490" y="202" width="300" height="2" rx="1" fill="url(#rule)" filter="url(#softbloom)"/>

  <!-- tagline + blinking caret -->
  <g filter="url(#softbloom)">
    <text x="50%" y="240" text-anchor="middle" fill="#9BF5B8" font-size="22" letter-spacing="1.5">jack of all trades, master of the terminal</text>
    <rect class="caret" x="956" y="225" width="13" height="22" fill="#02EEAA"/>
  </g>

  <!-- scanline overlay -->
  <rect width="1280" height="300" fill="url(#scan)"/>
</svg>
