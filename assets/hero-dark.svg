<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300" font-family="ui-monospace, 'IBM Plex Mono', 'Share Tech Mono', SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="TERRABYTE.SYS — jack of all trades, master of the terminal">
  <defs>
    <style>
      @keyframes blink { 0%, 48% { opacity: 1 } 49%, 100% { opacity: 0 } }
      .caret { animation: blink 1.06s steps(1) infinite; }
      @media (prefers-reduced-motion: reduce) { .caret { animation: none; opacity: 1 } }
      .lbl { fill: #2f6f4e; font-size: 15px; letter-spacing: 2px; }
    </style>
    <!-- phosphor bloom: triple gaussian stack + crisp glyph on top -->
    <filter id="phosphor" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="g1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"   result="g2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="11"  result="g3"/>
      <feMerge>
        <feMergeNode in="g3"/><feMergeNode in="g2"/><feMergeNode in="g1"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softbloom" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#02EEAA" stroke-width="1" stroke-opacity="0.05"/>
    </pattern>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" y="0" fill="#000000" fill-opacity="0.32"/>
    </pattern>
    <radialGradient id="spot" cx="50%" cy="40%" r="62%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topglow" cx="50%" cy="-6%" r="75%">
      <stop offset="0"   stop-color="#02EEAA" stop-opacity="0.20"/>
      <stop offset="0.45" stop-color="#02EEAA" stop-opacity="0.05"/>
      <stop offset="1"   stop-color="#02EEAA" stop-opacity="0"/>
    </radialGradient>
    <mask id="spotmask"><rect width="1280" height="300" fill="url(#spot)"/></mask>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#02EEAA" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#02EEAA" stop-opacity="1"/>
      <stop offset="1" stop-color="#02EEAA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- screen -->
  <rect width="1280" height="300" fill="#000000"/>
  <rect width="1280" height="300" fill="url(#grid)" mask="url(#spotmask)"/>
  <rect width="1280" height="300" fill="url(#topglow)"/>

  <!-- corner microcopy -->
  <text class="lbl" x="40" y="44">TERRABYTE BIOS v6.0.4</text>
  <g>
    <circle cx="1048" cy="39" r="4" fill="#02EEAA" filter="url(#softbloom)"/>
    <text class="lbl" x="1064" y="44">ALL SYSTEMS NOMINAL</text>
  </g>

  <!-- wordmark: TERRABYTE bright + .SYS dimmed, same baseline -->
