  <g transform="translate(532,77)"><rect width="90" height="27" rx="3" fill="#04090a" stroke="#02EEAA" stroke-width="1" stroke-opacity="0.30"/><text x="45" y="18" text-anchor="middle" fill="#9BF5B8" font-size="13.5" letter-spacing="1">Tailwind</text></g>
  <text x="34" y="136" fill="#2f6f4e" font-size="13" letter-spacing="3">INFRA / AI</text>
