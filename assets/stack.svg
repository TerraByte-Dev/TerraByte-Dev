  <g transform="translate(273,117)"><rect width="108" height="27" rx="3" fill="#04090a" stroke="#02EEAA" stroke-width="1" stroke-opacity="0.30"/><text x="54" y="18" text-anchor="middle" fill="#9BF5B8" font-size="13.5" letter-spacing="1">Cloudflare</text></g>
