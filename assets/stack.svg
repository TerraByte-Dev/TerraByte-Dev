  <g transform="translate(310,37)"><rect width="71" height="27" rx="3" fill="#04090a" stroke="#02EEAA" stroke-width="1" stroke-opacity="0.30"/><text x="36" y="18" text-anchor="middle" fill="#9BF5B8" font-size="13.5" letter-spacing="1">Python</text></g>
  <g transform="translate(393,37)"><rect width="44" height="27" rx="3" fill="#04090a" stroke="#02EEAA" stroke-width="1" stroke-opacity="0.30"/><text x="22" y="18" text-anchor="middle" fill="#9BF5B8" font-size="13.5" letter-spacing="1">Lua</text></g>
  <g transform="translate(449,37)"><rect width="34" height="27" rx="3" fill="#04090a" stroke="#02EEAA" stroke-width="1" stroke-opacity="0.30"/><text x="17" y="18" text-anchor="middle" fill="#9BF5B8" font-size="13.5" letter-spacing="1">C#</text></g>
